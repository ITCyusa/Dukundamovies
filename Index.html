<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dukundamovie</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
:root{
  --bg:#0f0f0f;
  --card:#181818;
  --red:#e50914;
  --green:#1db954;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:#fff;font-family:Arial,Helvetica,sans-serif}

/* NAVBAR */
.navbar{
  display:flex;gap:1rem;padding:1rem;
  align-items:center;background:#111;
  position:sticky;top:0;z-index:10;flex-wrap:wrap;
}
.logo{color:var(--red)}
input,select{background:#222;color:#fff;border:none;padding:.6rem;border-radius:4px}

/* GENRE BUTTONS */
.genre-buttons{display:flex;gap:0.5rem;padding:0.5rem 1rem;overflow-x:auto}
.genre-buttons button{background:#222;color:#fff;border:none;padding:.4rem .8rem;border-radius:4px;cursor:pointer}
.genre-buttons button.active{background:var(--red)}

/* HERO */
.hero{position:relative;height:60vh;overflow:hidden;margin-top:0.5rem}
.hero-slide{position:absolute;inset:0;opacity:0;background-size:cover;background-position:center;display:flex;align-items:flex-end;padding:2rem;transition:opacity 1s}
.hero-slide.active{opacity:1}
.hero-content{background:rgba(0,0,0,.6);padding:1rem;border-radius:6px;max-width:500px}
.hero-dots{position:absolute;bottom:15px;left:50%;transform:translateX(-50%);display:flex;gap:6px}
.dot{width:10px;height:10px;border-radius:50%;background:#fff;opacity:.5;cursor:pointer}
.dot.active{opacity:1}

/* SECTIONS */
.section{padding:1.5rem}
.row{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:1rem}
.load-more{margin-top:1rem;background:var(--red);padding:.6rem 1rem;border:none;color:#fff;border-radius:4px;cursor:pointer}

/* CARD */
.card{background:var(--card);border-radius:6px;overflow:hidden;cursor:pointer;transition:.3s}
.card:hover{transform:scale(1.08)}
.card img{width:100%}
.info{padding:.5rem;font-size:.9rem}

/* MODAL */
.modal{position:fixed;inset:0;background:rgba(0,0,0,.85);display:none;overflow:auto}
.modal-content{max-width:900px;margin:3rem auto;background:#111;padding:1.5rem;border-radius:8px}
iframe{width:100%;height:350px}
.close{float:right;font-size:1.5rem;cursor:pointer}
.btn{display:inline-block;background:var(--red);padding:.6rem 1.2rem;color:#fff;text-decoration:none;border-radius:4px}
.download{background:var(--green)}
</style>
</head>
<body>

<header class="navbar">
  <h1 class="logo">Dukundamovie</h1>
  <input id="search" placeholder="Search movies...">
  <select id="language">
    <option value="en-US">English</option>
    <option value="fr-FR">French</option>
    <option value="es-ES">Spanish</option>
    <option value="rw-RW">Kinyarwanda</option>
  </select>
</header>

<div class="genre-buttons" id="genreButtons"></div>

<section class="hero">
  <div id="heroSlides"></div>
  <div class="hero-dots" id="heroDots"></div>
</section>

<section class="section">
<h2>Trending</h2>
<div id="trending" class="row"></div>
<button class="load-more" id="loadMoreTrending">Load More</button>
</section>

<section class="section">
<h2>Popular</h2>
<div id="popular" class="row"></div>
<button class="load-more" id="loadMorePopular">Load More</button>
</section>

<section class="section">
<h2>New Releases</h2>
<div id="new" class="row"></div>
<button class="load-more" id="loadMoreNew">Load More</button>
</section>

<section class="section">
<h2>🎬 Upcoming Movies</h2>
<div id="upcoming" class="row"></div>
<button class="load-more" id="loadMoreUpcoming">Load More</button>
</section>

<div class="modal" id="modal">
  <div class="modal-content">
    <span class="close" onclick="closeModal()">✖</span>
    <iframe id="trailer"></iframe>
    <h2 id="title"></h2>
    <p id="overview"></p>
    <p><b>Genres:</b> <span id="genre"></span></p>
    <p><b>Rating:</b> ⭐ <span id="rating"></span></p>
    <a id="download" class="btn download">Download</a>
  </div>
</div>

<script>
const API_KEY="ec8b532c2ce677dec63393e7da0e6006";
const BASE="https://api.themoviedb.org/3";
const IMG="https://image.tmdb.org/t/p/w500";
const BACK="https://image.tmdb.org/t/p/w1280";

const rows={
  trending:document.getElementById("trending"),
  popular:document.getElementById("popular"),
  new:document.getElementById("new"),
  upcoming:document.getElementById("upcoming")
};

const loadButtons={
  trending:document.getElementById("loadMoreTrending"),
  popular:document.getElementById("loadMorePopular"),
  new:document.getElementById("loadMoreNew"),
  upcoming:document.getElementById("loadMoreUpcoming")
};

let movies={trending:[],popular:[],new:[],upcoming:[]};
let displayed={trending:0,popular:0,new:0,upcoming:0};
let batchSize=8;
let lang="en-US";

// FETCH
async function get(url){return fetch(url).then(r=>r.json());}

// LOAD MOVIES
async function load(){
  const l=lang==="rw-RW"?"en-US":lang;

  const t=await get(`${BASE}/trending/movie/week?api_key=${API_KEY}&language=${l}`);
  const p=await get(`${BASE}/movie/popular?api_key=${API_KEY}&language=${l}`);
  const n=await get(`${BASE}/movie/now_playing?api_key=${API_KEY}&language=${l}`);
  const u=await get(`${BASE}/movie/upcoming?api_key=${API_KEY}&language=${l}`);

  movies.trending=t.results;
  movies.popular=p.results;
  movies.new=n.results;
  movies.upcoming=u.results;

  // reset displayed count
  Object.keys(displayed).forEach(k=>displayed[k]=0);

  Object.keys(rows).forEach(k=>fillBatch(k));
  hero(movies.trending.slice(0,5));
}

// FILL BATCH
function fillBatch(section){
  const row=rows[section];
  const list=movies[section];
  const start=displayed[section];
  const end=Math.min(start+batchSize,list.length);
  for(let i=start;i<end;i++){
    const m=list[i];
    if(!m.poster_path) continue;
    const card=document.createElement("div");
    card.className="card";
    card.onclick=()=>details(m.id);
    card.innerHTML=`
      <img src="${IMG+m.poster_path}">
      <div class="info">
        <b>${m.title}</b>
        <p>⭐ ${m.vote_average}</p>
      </div>`;
    row.appendChild(card);
  }
  displayed[section]=end;
  loadButtons[section].style.display=(displayed[section]<list.length)?"block":"none";
}

// HERO
let heroIndex=0;
let heroInterval;
function hero(list){
  heroSlides.innerHTML="";heroDots.innerHTML="";
  list.forEach((m,i)=>{
    const slide=document.createElement("div");
    slide.className="hero-slide"+(i==0?" active":"");
    slide.style.backgroundImage=`linear-gradient(to top,#000,transparent), url(${BACK+m.backdrop_path})`;
    slide.innerHTML=`<div class="hero-content"><h2>${m.title}</h2><p>${m.overview}</p><a class="btn" onclick="details(${m.id})">View</a></div>`;
    heroSlides.appendChild(slide);

    const dot=document.createElement("div");
    dot.className="dot"+(i==0?" active":"");
    dot.onclick=()=>showSlide(i);
    heroDots.appendChild(dot);
  });
  clearInterval(heroInterval);
  heroInterval=setInterval(()=>{heroIndex=(heroIndex+1)%list.length;showSlide(heroIndex)},5000);
}

function showSlide(i){
  document.querySelectorAll(".hero-slide").forEach(s=>s.classList.remove("active"));
  document.querySelectorAll(".dot").forEach(d=>d.classList.remove("active"));
  document.querySelectorAll(".hero-slide")[i].classList.add("active");
  document.querySelectorAll(".dot")[i].classList.add("active");
  heroIndex=i;
}

// MODAL
async function details(id){
  modal.style.display="block";
  const m=await get(`${BASE}/movie/${id}?api_key=${API_KEY}&language=${lang==="rw-RW"?"en-US":lang}`);
  const v=await get(`${BASE}/movie/${id}/videos?api_key=${API_KEY}`);
  title.textContent=m.title;
  overview.textContent=m.overview;
  genre.textContent=m.genres.map(g=>g.name).join(", ");
  rating.textContent=m.vote_average;
  const t=v.results.find(x=>x.type==="Trailer");
  trailer.src=t?`https://www.youtube.com/embed/${t.key}`:"";
}

function closeModal(){modal.style.display="none";trailer.src=""}

// SEARCH
search.oninput=e=>{
  const q=e.target.value.toLowerCase();
  Object.keys(rows).forEach(section=>{
    rows[section].innerHTML="";
    displayed[section]=0;
    fillBatch(section); // show initial batch
    if(q){
      rows[section].innerHTML="";
      const filtered=movies[section].filter(m=>m.title.toLowerCase().includes(q));
      filtered.forEach(m=>{
        if(!m.poster_path) return;
        const card=document.createElement("div");
        card.className="card";
        card.onclick=()=>details(m.id);
        card.innerHTML=`<img src="${IMG+m.poster_path}"><div class="info"><b>${m.title}</b><p>⭐ ${m.vote_average}</p></div>`;
        rows[section].appendChild(card);
      });
      loadButtons[section].style.display="none";
    }
  });
}

// LOAD MORE
Object.keys(loadButtons).forEach(section=>{
  loadButtons[section].onclick=()=>fillBatch(section);
});

// LANGUAGE
language.onchange=e=>{lang=e.target.value;load();}

// INIT
load();
</script>
</body>
</html>
